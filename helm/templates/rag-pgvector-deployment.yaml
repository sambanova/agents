{{- if .Values.ragApi.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-pgvector
  namespace: {{ .Values.global.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-pgvector
  template:
    metadata:
      labels:
        app: rag-pgvector
    spec:
      containers:
      - name: pgvector
        image: pgvector/pgvector:pg16
        ports:
        - containerPort: 5432
        env:
        - name: POSTGRES_USER
          value: {{ index .Values.ragApi.env "POSTGRES_USER" | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ index .Values.ragApi.env "POSTGRES_PASSWORD" | quote }}
        - name: POSTGRES_DB
          value: {{ index .Values.ragApi.env "POSTGRES_DB" | quote }}
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "100m"
            memory: "256Mi"
        livenessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          exec:
            command: ["pg_isready", "-U", "postgres"]
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: rag-pgvector
  namespace: {{ .Values.global.namespace }}
spec:
  type: ClusterIP
  selector:
    app: rag-pgvector
  ports:
  - port: 5432
    targetPort: 5432
    protocol: TCP
{{- end }}
